name: finova
description: Finova — controle financeiro pessoal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  sqflite: ^2.4.2
  path: ^1.9.1
  go_router: ^14.8.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  animations: ^2.0.11
  flutter_animate: ^4.5.2
  font_awesome_flutter: ^10.8.0
  material_symbols_icons: ^4.2815.1
  google_fonts: ^6.2.1
  http: ^1.3.0
  xml: ^6.5.0
  crypto: ^3.0.6
  uuid: ^4.5.1
  equatable: ^2.0.7
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  webview_flutter: ^4.13.0
  webview_flutter_android: ^4.12.0
  webview_flutter_wkwebview: ^3.25.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#F8FAFC"
  image: assets/branding/splash_logo.png
  android_12:
    color: "#F8FAFC"
    image: assets/branding/splash_logo.png
  ios: true
  android: true
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
